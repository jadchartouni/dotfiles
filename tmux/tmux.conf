#-----------------------------------#
#---------- Configuration ----------#
#-----------------------------------#

# Use Vi mode
setw -g mode-keys vi

# Enable mouse
set -g mouse on

# Let tmux own the system clipboard (works over SSH via OSC 52)
set -g set-clipboard on

# Pick the right clipboard command per OS: macOS pbcopy, Wayland wl-copy,
# otherwise X11 xclip. Stored in @copy_cmd and referenced by the copy bindings.
if-shell "command -v pbcopy >/dev/null" \
    "set -g @copy_cmd 'pbcopy'" \
    "if-shell 'command -v wl-copy >/dev/null' \
        \"set -g @copy_cmd 'wl-copy'\" \
        \"set -g @copy_cmd 'xclip -selection clipboard -in'\""

# Window and pane numbering
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is removed.
set -g renumber-windows on

# Allow automatic renaming of windows
set -g allow-rename off

# Allow tmux to set the terminal title
set -g set-titles on

# Monitor window activity to display in the status bar
setw -g monitor-activity off

# Enable true color (24-bit) so themed colors render correctly inside tmux
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# A bell in another window should cause a bell in the current window
set -g bell-action any

# Don't show distracting notifications
set -g visual-bell off
set -g visual-activity off

# Focus events enabled for terminals that support them
set -g focus-events on

# Useful when using sharing a session with different size terminals
setw -g aggressive-resize on

# don't detach tmux when killing a session
set -g detach-on-destroy off

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0


#----------------------------------#
#---------- Key Bindings ----------#
#----------------------------------#

# -r means that the bind can repeat without entering prefix again
# -n means that the bind doesn't use the prefix

# Change default prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config file
unbind r
bind r source-file ~/.tmux.conf\; display-message '~/.tmux.conf reloaded'

# Window split bindings — open the new pane in the current pane's directory
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# New window opens in the current pane's directory too
bind c new-window -c "#{pane_current_path}"

# Copy to the system clipboard (see @copy_cmd above for the per-OS command).
# Mouse: drag selects and copies on release. Keyboard: in copy mode select
# with v/Space, then y or Enter copies.
bind -T copy-mode-vi y                  send -X copy-pipe-and-cancel "#{@copy_cmd}"
bind -T copy-mode-vi Enter              send -X copy-pipe-and-cancel "#{@copy_cmd}"
bind -T copy-mode-vi MouseDragEnd1Pane  send -X copy-pipe-no-clear "#{@copy_cmd}"

# Resize window panes — 5 cells per press, repeatable (hold prefix, tap h/j/k/l)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Resize the focused pane to an exact percentage of the window.
# prefix R -> type a number (e.g. 60) -> pane becomes that % wide. (%%% = the
# typed value followed by a literal %.) prefix T does the same for height.
bind R command-prompt -p "width pct:"  "resize-pane -x %%%"
bind T command-prompt -p "height pct:" "resize-pane -y %%%"


#-----------------------------#
#---------- Plugins ----------#
#-----------------------------#

# Use TPM for plugin management
set -g @plugin 'tmux-plugins/tpm'

# List of plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # Persist tmux sessions after restart
set -g @plugin 'tmux-plugins/tmux-continuum' # Automatically saves session every 15 minutes

# resurrect: also restore what was on screen and re-open nvim sessions.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
# continuum: auto-restore the last saved environment when the tmux server starts
# (without this, resurrect only saves/restores when you press prefix Ctrl-s / Ctrl-r).
set -g @continuum-restore 'on'


#---------------------------------#
#---------- Status line ----------#
#---------------------------------#
set-option -g status-position bottom
set-option -g status-left-length 100
set-option -g status-right-length 100
set-option -g status-left " #{session_name} "
set-option -g status-right "#{pane_title} "
# SentryCore palette: dark indigo bar (#1A1230) with lavender text.
set-option -g status-style "fg=#9890B8 bg=#1A1230"
# Session name as an accent badge on the left.
set-option -g status-left-style "fg=#E6E4F0 bg=#3D2570 bold"
set-option -g window-status-current-style "fg=#A855E0 bold"
set-option -g window-status-activity-style none

# Match the rest of the UI to the theme
# Inactive border dimmed further; active border uses the bright accent + bold
set-option -g pane-border-style "fg=#2E1C52"
set-option -g pane-active-border-style "fg=#A855E0 bold"

# Keep the terminal's default (transparent) bg so WezTerm translucency shows
# through; recede inactive panes via dimmer *foreground* only. The bold accent
# pane-border above is the primary "this pane is active" signal.
set-option -g window-style "fg=#8A82A8 bg=default"
set-option -g window-active-style "fg=#E6E4F0 bg=default"
set-option -g message-style "fg=#E6E4F0 bg=#2A1F4A"
set-option -g message-command-style "fg=#E6E4F0 bg=#2A1F4A"
set-option -g mode-style "fg=#FFFFFF bg=#3D2570"


#------------------------------------#
#---------- Plugin manager ----------#
#------------------------------------#
# Initialize plugin manager
# Keep this line at the very bottom
run '~/.tmux/plugins/tpm/tpm'
